name: Deploy Admin

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/novaride-admin

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.novaride.app' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Optional: pull and restart on your VPS via SSH (set secrets first).
  deploy:
    needs: build
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      && vars.ADMIN_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Remote deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ADMIN_DEPLOY_HOST }}
          username: ${{ secrets.ADMIN_DEPLOY_USER }}
          key: ${{ secrets.ADMIN_DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.ADMIN_DEPLOY_PATH || '/opt/novaride-admin' }}
            docker compose pull admin
            docker compose up -d admin
