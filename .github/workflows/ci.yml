name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  admin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # The app reads the API base URL at build time; a placeholder keeps
          # the production build deterministic in CI.
          NEXT_PUBLIC_API_URL: https://api.novaride.app

      # Lint is informational for now: the codebase has pre-existing lint debt
      # (mostly @typescript-eslint/no-explicit-any). It surfaces issues without
      # blocking merges. Flip continue-on-error to false once the debt is paid.
      - name: Lint
        run: npm run lint
        continue-on-error: true
