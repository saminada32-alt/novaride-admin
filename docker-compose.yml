# Admin panel — shares Docker network with API/Caddy (novaride-api_default).
#
#   cd ~/novaride-admin
#   NEXT_PUBLIC_API_URL=https://api.novaride.app docker compose up -d --build
#
# Caddy (in novaride-api) proxies admin.novaride.app → admin:3000
services:
  admin:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.novaride.app}
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
    networks:
      - novaride

networks:
  novaride:
    external: true
    name: novaride-api_default
